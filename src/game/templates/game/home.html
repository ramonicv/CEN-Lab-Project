{% extends 'base.html' %}
{% load static %}
{% block content %}

<div class="center-page text-center">

    <h1 class="display-4 fw-bold mb-3">Chupi!</h1>

    <p class="text-muted px-3">
        A work‑in‑progress app by Ramon Ortega, Chiara Savoretti, Samuel Marcano,
        Teena Singh, and Francisco de la Esp.
    </p>

    <div id="home-buttons-container"></div>

</div>

<script>
    // Render home page buttons from menu config
    function renderHomeButtons() {
        const container = document.getElementById('home-buttons-container');
        const config = window.MENU_CONFIG.home.startGame;
        
        container.innerHTML = `
            <button class="${config.class}" onclick="toSignup()">
                ${config.label}
            </button>
        `;
    }

    function toSignup() {
        window.location.href = "${window.MENU_CONFIG.home.startGame.url}";
    }

    window.addEventListener('DOMContentLoaded', renderHomeButtons);
</script>

{% endblock %}
