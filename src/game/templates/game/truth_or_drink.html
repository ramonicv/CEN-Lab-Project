<style>
    .question-display {
        width: 300px;
        min-height: 180px;
        border-radius: 16px;
        background: white;
        box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-size: 1.1rem;
        font-weight: 500;
        margin: 1rem auto;
        border: 3px solid #ddd;
        padding: 1.2rem;
        text-align: center;
        line-height: 1.5;
        transition: transform 0.2s ease, opacity 0.25s ease;
        cursor: pointer;
    }


    .rule-box {
        background: rgba(255,255,255,0.7);
        border-radius: 12px;
        padding: 0.75rem 1rem;
        margin: 0.5rem auto;
        max-width: 320px;
        font-size: 0.95rem;
        text-align: center;
        color: #555;
    }

    .player-turn {
        font-size: 1.2rem;
        font-weight: bold;
        margin-bottom: 0.5rem;
    }

    /* Swipe animation */
    .swipe-out {
        transform: translateX(-120px) rotate(-5deg);
        opacity: 0;
    }

    .swipe-in {
        transform: translateX(120px) rotate(5deg);
        opacity: 0;
        animation: swipeIn 0.25s forwards ease-out;
    }

    @keyframes swipeIn {
        to {
            transform: translateX(0) rotate(0);
            opacity: 1;
        }
    }

    /* Action buttons */
    .action-row {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-top: 0.5rem;
        flex-wrap: wrap;
    }

    .game-btn {
        font-weight: 600;
        padding: 10px 14px;
        border-radius: 12px;
        transition: all 0.2s ease;
        box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        border: none;
        cursor: pointer;
    }

    #truth-btn {
        background-color: #4CAF50;
        color: white;
        font-size: 1rem;
        padding: 12px 22px;
    }

    #drink-btn {
        background-color: #e74c3c;
        color: white;
        font-size: 1rem;
        padding: 12px 22px;
    }

    #skip-btn {
        background-color: rgba(255,255,255,0.9);
        border: 2px solid #6c757d !important;
        color: #2c2c2c;
    }

    #restart-btn {
        background-color: #ffc107;
        color: #1f1f1f;
    }

    /* Hold to go back */
    #back-button {
        position: relative;
        overflow: hidden;
        background-color: rgba(255,255,255,0.9);
        border: 2px solid #6c757d !important;
        color: #2c2c2c;
    }

    #back-button::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: 0;
        height: 3px;
        width: 0%;
        background: #f0ad4e;
        transition: width 2s linear;
    }

    #back-button.holding::after {
        width: 100%;
    }

    .game-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,0,0,0.25); }
    .game-btn:active { transform: scale(0.96); }


    #questions-left { font-size: 0.9rem; color: #888; }

    .result-flash {
        font-size: 1rem;
        font-weight: 700;
        min-height: 1.5rem;
        transition: opacity 0.3s ease;
    }

    .result-truth { color: #2e7d32; }
    .result-drink { color: #c62828; }
    .result-skip  { color: #888; }
</style>

<div class="center-page text-center">
    <h1 class="fw-bold">Truth or Drink</h1>

    <p class="player-turn" id="player-turn">Loading...</p>

    <!-- Question card -->
    <div class="question-display" id="question-display" onclick="nextQuestion()">
        <span id="question-text">Tap to reveal your first question!</span>
    </div>

    <div class="rule-box">
        Answer truthfully — or <strong>drink!</strong>
    </div>

    <p id="questions-left" class="mt-1"></p>

    <div class="result-flash" id="result-flash"></div>

    <!-- Truth / Drink -->
    <div class="action-row mt-2">
        <button class="game-btn" id="truth-btn" onclick="handleTruth()">Truth</button>
        <button class="game-btn" id="drink-btn" onclick="handleDrink()">Drink</button>
    </div>

    <!-- Skip / Restart / Back -->
    <div class="action-row mt-2">
        <button class="game-btn" id="skip-btn" onclick="nextQuestion()">Skip</button>
        <button class="game-btn" id="restart-btn" onclick="restartGame()">Restart</button>
        <button class="game-btn" id="back-button">Hold to Go Back</button>

</div>

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function buildDeck() {
    return shuffle(ALL_QUESTIONS.map((q, i) => ({ ...q, id: i })));
}

function getState() {
    const raw = localStorage.getItem(GAME_KEY);
    return raw ? JSON.parse(raw) : null;
}

function saveState(state) {
    localStorage.setItem(GAME_KEY, JSON.stringify(state));
}

function initGame() {
    const players = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    if (players.length === 0) {
        window.location.href = "{% url 'signup' %}";
        return null;
    }
    const state = {
        deck: buildDeck(),
        currentPlayerIndex: 0,
        players,
        currentQuestion: null,
        questionIndex: 0,
        totalAsked: 0,
    };
    saveState(state);
    return state;
}

function renderPlayer(state) {
    const player = state.players[state.currentPlayerIndex];
    document.getElementById('player-turn').innerHTML =
        `<span class="badge" style="background-color:${player.color}; color:black; font-size:1rem; padding:6px 14px; border-radius:12px;">
            ${player.name}'s turn
        </span>`;
}

function updateQuestionsLeft(state) {
    document.getElementById('questions-left').textContent =
        state.deck.length > 0 ? `${state.deck.length} questions remaining` : 'All questions used!';
}

function animateQuestion(question) {
    const display = document.getElementById('question-display');
    display.classList.add('swipe-out');
    setTimeout(() => {
        document.getElementById('question-text').textContent = question.text;
        display.classList.remove('swipe-out');
        display.classList.add('swipe-in');
        setTimeout(() => display.classList.remove('swipe-in'), 250);
    }, 150);
}

function showFlash(msg, cls) {
    const el = document.getElementById('result-flash');
    el.textContent = msg;
    el.className = `result-flash ${cls}`;
    setTimeout(() => { el.textContent = ''; el.className = 'result-flash'; }, 1500);
}

function nextQuestion(autoAdvance = false) {
    let state = getState();
    if (!state) state = initGame();
    if (!state) return;

    if (state.deck.length === 0) {
        document.getElementById('question-text').textContent = "You've gone through all the questions! Restart to play again.";
        document.getElementById('questions-left').textContent = '';
        return;
    }

    const question = state.deck.pop();
    state.currentQuestion = question;

    if (!autoAdvance) {
        // advance player only on manual next/skip
        state.currentPlayerIndex = (state.currentPlayerIndex + 1) % state.players.length;
    }

    saveState(state);
    animateQuestion(question);
    renderPlayer(state);
    updateQuestionsLeft(state);
}

function handleTruth() {
    showFlash('They answered!', 'result-truth');
    nextQuestion(false);
}

function handleDrink() {
    showFlash('Drink up!', 'result-drink');
    nextQuestion(false);
}

function restartGame() {
    localStorage.removeItem(GAME_KEY);
    const state = initGame();
    if (!state) return;
    renderPlayer(state);
    updateQuestionsLeft(state);
    document.getElementById('question-text').textContent = 'Tap to reveal your first question!';
    document.getElementById('result-flash').textContent = '';
}

backButton.addEventListener('mouseup', cancelHold);
backButton.addEventListener('mouseleave', cancelHold);
backButton.addEventListener('touchstart', startHold);
backButton.addEventListener('touchend', cancelHold);

function startHold() {
    backButton.classList.add('holding');
    holdTimer = setTimeout(() => {

    }, 2000);
}

function cancelHold() {
    clearTimeout(holdTimer);
    backButton.classList.remove('holding');
}

window.addEventListener('DOMContentLoaded', () => {
    const state = initGame();
    if (!state) return;
    renderPlayer(state);
    updateQuestionsLeft(state);
});
