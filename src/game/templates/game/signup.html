{% extends 'base.html' %}
{% block content %}
<div class="center-page">
    <h1>Who's playing?</h1>
    <p id="player-count">0 / 10 players</p>

    <div id="player-list"></div>

    <div id="input-area">
        <input type="text" id="name-input" placeholder="Enter name" maxlength="20">
        <button onclick="addPlayer()">Add Player</button>
    </div>

    <div style="Margin-top: 20px;">
        <button type="button" onclick="clearPlayers()">Clear List</button>
        <button type="submit" id="continue-btn" style="display:none; background-color: #4CAF50; color: white;" onclick="continueSignup()">
            Continue
        </button>
    </div>
</div>

<script>
    const MAX = 10;
    const STORAGE_KEY = 'chupi_players';
    
    function getPlayers() {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    }

    function render() {
        const players = getPlayers();
        const listContainer = document.getElementById('player-list');
        const continueBtn = document.getElementById('continue-btn');

        // update 'player-count' html element based on players array length 
        document.getElementById('player-count').textContent = `${players.length} / ${MAX} players`;
        listContainer.innerHTML = players.map(p => `<div class="player-entry">${p}</div>`).join('');
        
        // Show start button if there are at least 2 players, hide input area if max reached
        continueBtn.style.display = players.length >= 2 ? 'inline-block' : 'none';
        document.getElementById('input-area').style.display = players.length >= MAX ? 'none' : 'block';
    }

    function addPlayer() {
        const input = document.getElementById('name-input');
        const name = input.value.trim();
        let players = getPlayers();

        // Prevent duplicates (case-insensitive) and enforce max
        if (name && !players.some(p => p.toLowerCase() === name.toLowerCase()) && players.length < MAX) {
            players.push(name);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(players));
            input.value = '';
            render();
        }
    }

    function clearPlayers() {
        localStorage.removeItem(STORAGE_KEY);
        render();
    }
    
    function continueSignup() { 
        // update this when the game page exists; theoretically, it should go to the screen where you can select what game to play
    }

    // attach enter key to addPlayer()
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('name-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') addPlayer();
        });
        render();
    });
    window.onload = render;
</script>
{% endblock %}
