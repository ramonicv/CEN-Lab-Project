{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="center-page text-center">
    <h1 class="fw-bold mb-1">Pick a Game!</h1>

    <div id="player-preview" class="mb-4"></div>

    <div id="game-buttons-container" class="d-grid gap-3 w-150 mx-auto"></div>

    <div class="mt-4">
        <div id="back-button-container"></div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'chupi_players';

    // Render game buttons from menu config
    function renderGameButtons() {
        const container = document.getElementById('game-buttons-container');
        const games = window.MENU_CONFIG.gameSelect.games;
        
        container.innerHTML = games.map(game => 
            `<a href="${game.url}" class="${game.class}">${game.label}</a>`
        ).join('');
    }

    // Render back button from menu config
    function renderBackButton() {
        const container = document.getElementById('back-button-container');
        const config = window.MENU_CONFIG.gameSelect.back;
        
        container.innerHTML = `
            <a href="${config.url}" class="${config.class}">${config.label}</a>
        `;
    }

    window.addEventListener('DOMContentLoaded', () => {
        renderGameButtons();
        renderBackButton();

        const players = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        const preview = document.getElementById('player-preview');

        if (players.length === 0) {
            // no players found, send them back
            window.location.href = "{% url 'signup' %}";
            return;
        }

        preview.innerHTML = players.map(p =>
            `<span class="badge me-1 mb-1" style="background-color:${p.color}; color:black; font-size:0.9rem; padding: 6px 12px; border-radius:12px;">
                ${p.name}
            </span>`
        ).join('');
    });
</script>
{% endblock %}
