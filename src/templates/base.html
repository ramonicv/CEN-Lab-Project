{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <meta name="author" content="Ramon Ortega">
        <meta name="description" content="CEN Lab Project - Chupi">
        <meta name="keywords"
            content="Chupi, game, CEN, CEN4020, CEN4090L, lab, project, Django, Python">
        

        <!-- Bootstrap -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
        
        <style>
            /* Randomize background color on each page load */
            body {
            transition: background-color 0.6s ease-in-out;
            }

            .corner-button { /* Styles for the corner button */
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background-color: #4CAF50; /*Makes start button green */
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s, background-color 0.2s;
            z-index: 1000; /* Ensures it stays above other elements */ }    
            

            .corner-button:hover {
                background-color: #45a049;
                transform: scale(1.05);
            }

            /* Mobile container to center content and give it a max width of 480px */
            .mobile-container {
            max-width: 480px;
            min-height: 100vh;
            margin: 0 auto;
            padding: 0 1rem;
            }
            
            /* Center content vertically and horizontally */
            .center-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 80vh;
            animation: pageFade o.35s ease-in-out;
            }

             /* Page fade-in animation */
            @keyframes pageFade {
                from {
                    opacity: 0;
                    transform: translateY(8px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            /* Global Button Styles*/
            button,
            .btn {
                transition: all 0.2s ease-in-out;
            }

            button:hover,
            .btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 6px 15px rgba(0,0,0,0.15);
            }

            button:active,
            .btn:active {
                transform: scale(0.97);
            }

            /* Input smoothness */
            input,
            .form-control {
                transition: all 0.2s ease-in-out;
            }

            input:focus,
            .form-control:focus {
                transform: scale(1.02);
                box-shadow: 0 0 10px rgba(0,0,0,0.15);
            }

        </style>

        <!-- Menu Configuration -->
        <script>
            /**
             * Centralized Menu Configuration
             * All menu buttons across the application are configured here
             */
            window.MENU_CONFIG = {
                // Home page buttons
                home: {
                    startGame: {
                        label: 'Start Game',
                        url: '{% url "signup" %}',
                        class: 'btn btn-success btn-lg mt-4',
                        action: 'navigate'
                    }
                },

                // Signup page buttons
                signup: {
                    clearList: {
                        label: 'Clear List',
                        class: 'btn btn-outline-danger me-2',
                        action: 'custom',
                        handler: 'clearPlayers'
                    },
                    continue: {
                        label: 'Continue',
                        id: 'toSignup-btn',
                        class: 'btn btn-success',
                        style: 'display:none;',
                        action: 'navigate',
                        url: '{% url "game_select" %}'
                    }
                },

                // Game select page buttons
                gameSelect: {
                    games: [
                        {
                            label: 'FSU Trivia',
                            url: '{% url "fsu_trivia" %}',
                            class: 'btn btn-lg btn-primary'
                        },
                        {
                            label: 'Waterfall',
                            url: '{% url "waterfall" %}',
                            class: 'btn btn-lg btn-primary'
                        },
                        {
                            label: 'Picolo',
                            url: '{% url "picolo" %}',
                            class: 'btn btn-lg btn-primary'
                        },
                        {
                            label: 'Screw the Dealer',
                            url: '{% url "screw_the_dealer" %}',
                            class: 'btn btn-lg btn-primary'
                        },
                        {
                            label: 'Ride the Bus',
                            url: '{% url "ride_the_bus" %}',
                            class: 'btn btn-lg btn-primary'
                        },
                        {
                            label: 'Truth or Drink',
                            url: '{% url "truth_or_drink" %}',
                            class: 'btn btn-lg btn-primary'
                        },
                        {
                            label: 'Imposter',
                            url: '{% url "imposter" %}',
                            class: 'btn btn-lg btn-primary'
                        }
                    ],
                    back: {
                        label: 'Back',
                        url: '{% url "signup" %}',
                        class: 'btn btn-outline-secondary btn-sm',
                        action: 'navigate'
                    }
                },

                // Game page buttons
                game: {
                    backButton: {
                        label: 'Hold to Go Back',
                        id: 'back-button',
                        class: 'game-btn',
                        url: '{% url "game_select" %}',
                        action: 'hold',
                        holdDuration: 2000,
                        holdThreshold: 2000
                    }
                }
            };
        </script>
    </head>
    
    <body>
        <div class="mobile-container">
            <main>
                {% block content %}
                <a href="{% url 'signup' %}" class="corner-button">Start Game</a>
                {% endblock %}
            </main>
        </div>

        <!-- Random background from a list of pastel colors -->
        <script>
            const colors = [
                '#FFB3BA',
                '#FFDFBA',
                '#FFFFBA',
                '#BAFFC9',
                '#BAE1FF',
                '#E8BAFF',
                '#FFBAEF',
            ];
            const random = colors[Math.floor(Math.random() * colors.length)];

            document.body.style.transition = "background-color 0.6s ease-in-out";
            document.body.style.backgroundColor = random;
        </script>
    </body>
</html>
