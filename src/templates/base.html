{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <meta name="author" content="Ramon Ortega">
        <meta name="description" content="CEN Lab Project - Chupi">
        <meta name="keywords"
            content="Chupi, game, CEN, CEN4020, CEN4090L, lab, project, Django, Python">

        <!-- Bootstrap -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
        
        <style>
            /* Randomize background color on each page load */
            body {
            transition: background-color 0.3s ease;
            }

            /* Mobile container to center content and give it a max width of 480px */
            .mobile-container {
            max-width: 480px;
            min-height: 100vh;
            margin: 0 auto;
            padding: 0 1rem;
            }
            
            /* Center content vertically and horizontally */
            .center-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 80vh;
            }
        </style>
    </head>
    
    <body>
        <div class="mobile-container">
            <main>
                {% block content %}
                {% endblock %}
            </main>
        </div>
        <!-- Random background from a list of pastel colors -->
        <script>
            const colors = [
                '#FFB3BA',
                '#FFDFBA',
                '#FFFFBA',
                '#BAFFC9',
                '#BAE1FF',
                '#E8BAFF',
                '#FFBAEF',
            ];
            const random = colors[Math.floor(Math.random() * colors.length)];
            document.body.style.backgroundColor = random;
        </script>
    </body>
</html>
